name: Weekly MyScheme Scraper

on:
  schedule:
    # This runs at 00:00 UTC every Wednesday
    - cron: '0 0 * * 3' 
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Chrome and Driver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Run Scraper
        # Match exactly: Jansaathi_backend/scraper.py
        run: python Jansaathi_backend/scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Added Jansaathi_backend/ path to the json file
          git add Jansaathi_backend/schemes.json
          git commit -m "Automated Weekly Scrape: $(date)" || echo "No changes to commit"
          git push origin main