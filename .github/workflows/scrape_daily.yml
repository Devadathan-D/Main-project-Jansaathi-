name: Daily MyScheme Scraper

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # This forces a clean copy and ignores the broken 'jansaathi2' link
          set-safe-directory: 'true'
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Chrome and Driver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Run Scraper
        # Using the venv path from your VS Code screenshot
        run: python Jansaathi_backend/scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # We use -f (force) here to make sure it ignores any git errors during add
          git add -f Jansaathi_backend/schemes.json
          git commit -m "Automated Daily Scrape: $(date)" || echo "No changes to commit"
          git push origin main