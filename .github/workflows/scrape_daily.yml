name: Daily MyScheme Scraper

on:
  schedule:
    # This runs at 00:00 UTC every single day
    - cron: '0 0 * * *' 
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # This fix prevents the "exit code 128" by ignoring problematic submodules
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Chrome and Driver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Run Scraper
        # Points to your script inside the venv folder as seen in your VS Code
        run: python Jansaathi_backend/venv/scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Correct path to your JSON file based on Jansaathi_backend folder
          git add Jansaathi_backend/schemes.json
          git commit -m "Automated Daily Scrape: $(date)" || echo "No changes to commit"
          git push origin main